<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Головоломка</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    
    #ui {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 100;
      pointer-events: none;
    }
    
    .button {
      background: rgba(0, 0, 0, 0.8);
      color: white;
      border: 2px solid #4CAF50;
      padding: 15px 30px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: bold;
      margin: 0 10px;
      pointer-events: auto;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    
    .hint {
      background: rgba(0, 0, 0, 0.7);
      color: #FFD700;
      padding: 10px 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: inline-block;
      font-size: 16px;
    }
    
    #progress {
      position: fixed;
      top: 20px;
      left: 20px;
      right: 20px;
      height: 20px;
      background: rgba(0,0,0,0.5);
      border-radius: 10px;
      overflow: hidden;
      z-index: 100;
    }
    
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #4CAF50, #8BC34A);
      width: 0%;
      transition: width 0.3s;
    }
    
    #score {
      position: fixed;
      top: 50px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 18px;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div class="hint" id="hint-text">Найдите красный куб!</div>
    <div>
      <button class="button" onclick="showHint()">Подсказка</button>
      <button class="button" onclick="resetPuzzle()">Сброс</button>
    </div>
  </div>
  
  <div id="progress">
    <div id="progress-bar"></div>
  </div>
  
  <div id="score">🔍 Найдено: 0/5</div>
  
  <a-scene id="scene" embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    <!-- Маркер для головоломки -->
    <a-marker preset="hiro" id="main-marker">
      <!-- Контейнер для всех объектов головоломки -->
      <a-entity id="puzzle-container" position="0 0 0">
        <!-- Объекты будут добавляться динамически -->
      </a-entity>
    </a-marker>
    
    <a-entity camera></a-entity>
  </a-scene>
  
  <script src="js/ar-puzzle.js"></script>
</body>
</html>
